name: 混淆Worker JS文件

于:
  push:
    分支:
      - main
    paths:
      - '_worker.js'
  workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出仓库
      uses: actions/checkout@v4
      
    - name: 设置Node.js环境
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 安装混淆工具
      run: npm install -g javascript-obfuscator
        
    - name: 检查_worker.js是否存在
      id: check_files
      run: |
        if [ -f "_worker.js" ]; then
          echo "文件 _worker.js 存在"
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "文件 _worker.js 不存在"
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
        
    - name: 等待5分钟延时
      if: steps.check_files.outputs.exists == 'true'
      run: |
        echo "开始等待5分钟..."
        sleep 300
        echo "5分钟延时完成"
        
    - name: 混淆_worker.js到11_worker.js
      if: steps.check_files.outputs.exists == 'true'
      run: |
        npx javascript-obfuscator _worker.js \
          --compact true \
          --control-flow-flattening true \
          --control-flow-flattening-threshold 0.75 \
          --dead-code-injection true \
          --dead-code-injection-threshold 0.4 \
          --identifier-names-generator hexadecimal \
          --rename-globals true \
          --string-array true \
          --string-array-encoding 'rc4' \
          --string-array-threshold 0.75 \
          --transform-object-keys true \
          --unicode-escape-sequence true \
          --self-defending true \
          --debug-protection true \
          --output 11_worker.js
          
        echo "成功混淆 _worker.js 到 11_worker.js"
        
    - name: 提交混淆后的文件11_worker.js
      if: steps.check_files.outputs.exists == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add 11_worker.js
        if [[ -n $(git status --porcelain) ]]; then
          git commit -m "混淆后的文件11_worker.js"
          git push
        else
          echo "没有更改需要提交"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
