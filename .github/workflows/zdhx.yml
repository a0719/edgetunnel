name: 定时混淆并生成 hx_worker.js
on:
  schedule:
    # 每24小时执行一次，UTC时间每天凌晨2点
    # - cron: '0 2 * * *'
    - cron: '42 * * * *'
  workflow_dispatch:  # 保留手动触发选项

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查 _worker.js 文件是否存在
        run: |
          if [ ! -f "_worker.js" ]; then
            echo "错误：仓库根目录中未找到 '_worker.js' 文件"
            echo "请确保仓库中包含 '_worker.js' 文件后再运行此工作流"
            exit 1
          fi
          echo "找到 _worker.js 文件，继续执行..."

      - name: 检查并删除现有的 hx_worker.js 文件
        run: |
          if [ -f "hx_worker.js" ]; then
            echo "发现现有的 hx_worker.js 文件，正在删除..."
            rm hx_worker.js
            echo "已删除旧的 hx_worker.js 文件"
          else
            echo "未发现 hx_worker.js 文件，继续执行..."
          fi

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 安装混淆工具
        run: |
          npm install -g javascript-obfuscator@latest
          # 检查安装版本
          javascript-obfuscator --version

      - name: 混淆 _worker.js 文件并生成 hx_worker.js
        run: |
          javascript-obfuscator _worker.js --output hx_worker.js \
          --compact true \
          --control-flow-flattening false \
          --dead-code-injection false \
          --identifier-names-generator hexadecimal \
          --rename-globals false \
          --string-array true \
          --string-array-encoding 'base64' \
          --string-array-threshold 0.7 \
          --transform-object-keys false \
          --unicode-escape-sequence true \
          --self-defending false \
          --debug-protection false \
          --split-strings true \
          --split-strings-chunk-length 5 \
          --numbers-to-expressions true \
          --string-array-index-shift true \
          --reserved-strings '^fetch$|^Response$|^Request$|^Headers$|^URL$|^addEventListener$|^WebSocket$|^console$' \
          --reserved-names '^env$|^globalThis$|^__dirname$|^__filename$|^exports$|^module$'

      - name: 检查混淆结果
        run: |
          if [ ! -s "hx_worker.js" ] || [ "$(wc -c < hx_worker.js)" -eq 0 ]; then
            echo "混淆后文件为空或损坏"
            exit 1
          fi
          echo "混淆完成，文件大小: $(wc -c < hx_worker.js) 字节"

      - name: 提交更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f "hx_worker.js" ]; then
            git add hx_worker.js
            git commit -m "自动化：生成混淆后的 hx_worker.js 文件
            - 原始文件: _worker.js (保留)
            - 混淆文件: hx_worker.js
            - 混淆时间: $(date -u)"
            echo "CHANGES_COMMITTED=true" >> $GITHUB_ENV
          else
            echo "CHANGES_COMMITTED=false" >> $GITHUB_ENV
            echo "hx_worker.js 文件不存在"
          fi

      - name: 推送更改
        if: env.CHANGES_COMMITTED == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          tags: false